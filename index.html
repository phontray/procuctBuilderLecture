<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제휴 및 문의</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="theme-toggle">
        <button id="theme-btn">다크 모드</button>
    </div>
    
    <main>
        <div class="container contact-container">
            <h2>제휴 문의</h2>
            <form action="https://formspree.io/f/xpqngldw" method="POST">
                <div class="form-group">
                    <label for="company">회사명</label>
                    <input type="text" id="company" name="company" required placeholder="회사명을 입력해주세요">
                </div>
                <div class="form-group">
                    <label for="name">담당자명</label>
                    <input type="text" id="name" name="name" required placeholder="담당자 성함을 입력해주세요">
                </div>
                <div class="form-group">
                    <label for="email">이메일</label>
                    <input type="email" id="email" name="_replyto" required placeholder="연락받을 이메일을 입력해주세요">
                </div>
                <div class="form-group">
                    <label for="message">문의 내용</label>
                    <textarea id="message" name="message" required placeholder="상세한 제휴 내용을 입력해주세요"></textarea>
                </div>
                <button type="submit" id="submit-btn">문의하기</button>
            </form>
        </div>

        <div class="container disqus-container">
            <div id="disqus_thread"></div>
            <script>
                (function() {
                var d = document, s = d.createElement('script');
                s.src = 'https://productbuilderlec2.disqus.com/embed.js';
                s.setAttribute('data-timestamp', +new Date());
                (d.head || d.body).appendChild(s);
                })();
            </script>
            <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
        </div>
    </main>

    <script src="main.js"></script>
</body>
</html>
