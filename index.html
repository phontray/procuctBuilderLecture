<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인공지능 동물상 테스트</title>
    <link rel="stylesheet" href="style.css">
    <!-- Teachable Machine Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
</head>
<body>
    <div class="theme-toggle">
        <button id="theme-btn">다크 모드</button>
    </div>
    
    <main>
        <div class="container main-container">
            <h1>인공지능 동물상 테스트</h1>
            <p>사진을 업로드하여 당신의 동물상을 확인해보세요!</p>
            
            <div class="upload-area" id="upload-area">
                <input type="file" id="file-input" accept="image/*" hidden>
                <div class="upload-icon">📷</div>
                <p>클릭하거나 파일을 드래그하여 업로드하세요</p>
            </div>

            <div id="image-preview-container" style="display: none;">
                <img id="image-preview" src="" alt="업로드 이미지">
            </div>

            <div id="loading" style="display: none;">
                <div class="spinner"></div>
                <p>분석 중...</p>
            </div>

            <div id="result-container" style="display: none;">
                <h2 id="result-title"></h2>
                <div id="label-container"></div>
            </div>

            <button id="retry-btn" style="display: none;">다시 시도하기</button>
        </div>

        <div class="container contact-container">
            <h2>제휴 문의</h2>
            <form action="https://formspree.io/f/xpqngldw" method="POST">
                <div class="form-group">
                    <label for="company">회사명</label>
                    <input type="text" id="company" name="company" required placeholder="회사명을 입력해주세요">
                </div>
                <div class="form-group">
                    <label for="name">담당자명</label>
                    <input type="text" id="name" name="name" required placeholder="담당자 성함을 입력해주세요">
                </div>
                <div class="form-group">
                    <label for="email">이메일</label>
                    <input type="email" id="email" name="_replyto" required placeholder="연락받을 이메일을 입력해주세요">
                </div>
                <div class="form-group">
                    <label for="message">문의 내용</label>
                    <textarea id="message" name="message" required placeholder="상세한 제휴 내용을 입력해주세요"></textarea>
                </div>
                <button type="submit" id="submit-btn">문의하기</button>
            </form>
        </div>

        <div class="container disqus-container">
            <div id="disqus_thread"></div>
            <script>
                (function() {
                var d = document, s = d.createElement('script');
                s.src = 'https://productbuilderlec2.disqus.com/embed.js';
                s.setAttribute('data-timestamp', +new Date());
                (d.head || d.body).appendChild(s);
                })();
            </script>
            <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
        </div>
    </main>

    <script src="main.js"></script>
</body>
</html>
