<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 당첨 예상번호</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="theme-toggle">
        <a href="animal-test.html" class="nav-link">동물상 테스트</a>
        <button id="theme-btn">다크 모드</button>
    </div>
    
    <main>
        <div id="lotto-container" class="container">
            <h2>로또 당첨 예상번호</h2>
            <p>1등 당첨을 기원하며 번호를 생성해보세요!</p>
            <div id="lotto-results"></div>
            <div class="lotto-btns">
                <button id="lotto-generate-btn">로또 번호 생성하기</button>
                <button id="lotto-reset-btn" class="secondary-btn" style="display: none;">처음으로</button>
            </div>
        </div>

        <div class="container contact-container">
            <h2>제휴 문의</h2>
            <form action="https://formspree.io/f/xpqngldw" method="POST">
                <div class="form-group">
                    <label for="company">회사명</label>
                    <input type="text" id="company" name="company" required placeholder="회사명을 입력해주세요">
                </div>
                <div class="form-group">
                    <label for="name">담당자명</label>
                    <input type="text" id="name" name="name" required placeholder="담당자 성함을 입력해주세요">
                </div>
                <div class="form-group">
                    <label for="email">이메일</label>
                    <input type="email" id="email" name="_replyto" required placeholder="연락받을 이메일을 입력해주세요">
                </div>
                <div class="form-group">
                    <label for="message">문의 내용</label>
                    <textarea id="message" name="message" required placeholder="상세한 제휴 내용을 입력해주세요"></textarea>
                </div>
                <button type="submit" id="submit-btn">문의하기</button>
            </form>
        </div>
    </main>

    <script src="main.js"></script>
</body>
</html>
